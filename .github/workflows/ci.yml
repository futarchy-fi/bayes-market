name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, futarchy-fleet]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short
        timeout-minutes: 5
