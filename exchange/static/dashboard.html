<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Futarchy Markets</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #0d1117; color: #e6edf3; line-height: 1.5; }
a { color: #58a6ff; text-decoration: none; }
a:hover { text-decoration: underline; }
code, .mono { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; }

.container { max-width: 960px; margin: 0 auto; padding: 16px; }
header { display: flex; align-items: center; gap: 12px; padding: 16px 0; border-bottom: 1px solid #30363d; margin-bottom: 24px; flex-wrap: wrap; }
header h1 { font-size: 20px; font-weight: 600; }
header .subtitle { color: #8b949e; font-size: 14px; }
header .home-link { display: inline-flex; align-items: center; padding: 5px 10px; border: 1px solid #30363d; border-radius: 999px; color: #8b949e; font-size: 13px; }
header .home-link:hover { color: #e6edf3; border-color: #58a6ff; text-decoration: none; }
header .spacer { flex: 1; }

/* Auth bar in header */
.auth-bar { display: flex; align-items: center; gap: 10px; font-size: 13px; flex-wrap: wrap; justify-content: flex-end; }
.auth-bar .auth-label { color: #8b949e; }
.auth-bar .username { color: #3fb950; font-weight: 500; }
.auth-bar .balance-wrap { display: flex; flex-direction: column; align-items: flex-end; line-height: 1.2; }
.auth-bar .balance { color: #58a6ff; font-family: 'SF Mono', monospace; }
.auth-bar .balance-detail { color: #8b949e; font-size: 12px; font-family: 'SF Mono', monospace; }
.auth-bar button { padding: 4px 12px; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: #e6edf3; cursor: pointer; font-size: 13px; }
.auth-bar button:hover { border-color: #58a6ff; }
.auth-bar button.logout { color: #f85149; border-color: #f85149; background: transparent; }
.auth-bar button.logout:hover { background: #3d1f1f33; }

/* Filter tabs */
.market-controls { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
.tabs { display: flex; gap: 4px; }
.tab { padding: 6px 16px; border-radius: 6px; border: 1px solid #30363d; background: transparent; color: #8b949e; cursor: pointer; font-size: 14px; }
.tab:hover { color: #e6edf3; border-color: #8b949e; }
.tab.active { background: #21262d; color: #e6edf3; border-color: #58a6ff; }
.repo-filter { display: flex; align-items: center; gap: 8px; color: #8b949e; font-size: 13px; }
.repo-filter select { padding: 6px 10px; border-radius: 6px; border: 1px solid #30363d; background: #161b22; color: #e6edf3; font-size: 13px; }

/* Market cards */
.market-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 12px; cursor: pointer; transition: border-color 0.15s; }
.market-card:hover { border-color: #58a6ff; }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
.card-question { font-size: 15px; font-weight: 500; flex: 1; }
.card-badges { display: flex; gap: 6px; flex-shrink: 0; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; }
.badge-open { background: #1f6f2b; color: #3fb950; }
.badge-resolved { background: #1a3a5c; color: #58a6ff; }
.badge-void { background: #3d2e1f; color: #f0883e; }
.badge-conditional { background: #1a1a2e; color: #b388ff; border: 1px solid #4a3a6e; }
.repo-pill { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; background: #0d1117; color: #8b949e; border: 1px solid #30363d; }

/* Price bar */
.price-bar-container { margin-bottom: 8px; }
.price-bar { display: flex; height: 28px; border-radius: 4px; overflow: hidden; font-size: 13px; font-weight: 600; }
.price-yes { background: #238636; display: flex; align-items: center; justify-content: center; color: #fff; min-width: 36px; transition: width 0.3s ease; }
.price-no { background: #da3633; display: flex; align-items: center; justify-content: center; color: #fff; min-width: 36px; transition: width 0.3s ease; }
.price-void { background: #6e4020; display: flex; align-items: center; justify-content: center; color: #f0883e; width: 100%; }
.price-labels { display: flex; justify-content: space-between; font-size: 12px; color: #8b949e; margin-top: 4px; }

.card-footer { display: flex; gap: 16px; font-size: 13px; color: #8b949e; }

/* Market detail */
.back-link { display: inline-block; margin-bottom: 16px; font-size: 14px; color: #8b949e; }
.back-link:hover { color: #e6edf3; }
.detail-header { margin-bottom: 24px; }
.detail-question { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
.detail-meta { display: flex; flex-wrap: wrap; gap: 16px; font-size: 14px; color: #8b949e; align-items: center; }

.price-display { display: flex; gap: 16px; margin-bottom: 24px; }
.price-box { flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; text-align: center; }
.price-box.yes { border-color: #238636; }
.price-box.no { border-color: #da3633; }
.price-label { font-size: 14px; color: #8b949e; margin-bottom: 4px; }
.price-value { font-size: 36px; font-weight: 700; font-family: 'SF Mono', monospace; }
.price-value.yes { color: #3fb950; }
.price-value.no { color: #f85149; }

.section { margin-bottom: 24px; }
.section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #30363d; }

table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { text-align: left; padding: 8px; color: #8b949e; font-weight: 500; border-bottom: 1px solid #30363d; }
td { padding: 8px; border-bottom: 1px solid #21262d; }
td.mono { font-family: 'SF Mono', monospace; font-size: 13px; }
tr:hover { background: #1c2128; }

.empty { color: #8b949e; font-style: italic; padding: 20px 0; text-align: center; }

.resolution-banner { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-weight: 500; }
.resolution-banner.yes { background: #1f6f2b33; border: 1px solid #238636; color: #3fb950; }
.resolution-banner.no { background: #3d1f1f33; border: 1px solid #da3633; color: #f85149; }
.resolution-banner.void { background: #3d2e1f33; border: 1px solid #6e4020; color: #f0883e; }

.rules-box { background: #1a1a2e; border: 1px solid #4a3a6e; border-radius: 8px; padding: 14px 16px; margin-bottom: 20px; font-size: 13px; color: #c0b0e0; }
.rules-box strong { color: #b388ff; }
.rules-box .rule-row { display: flex; gap: 8px; margin-top: 6px; }
.rules-box .rule-label { font-weight: 600; min-width: 50px; }
.rules-box .rule-yes { color: #3fb950; }
.rules-box .rule-no { color: #f85149; }
.rules-box .rule-void { color: #f0883e; }

/* Depth table */
.depth-table { margin-top: 8px; }
.depth-table td.cost { color: #58a6ff; }

/* Collapsible LMSR reference */
details.lmsr-ref { margin-bottom: 24px; }
details.lmsr-ref summary { cursor: pointer; color: #8b949e; font-size: 13px; padding: 8px 0; }
details.lmsr-ref summary:hover { color: #e6edf3; }
details.lmsr-ref .ref-content { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; font-size: 13px; color: #8b949e; margin-top: 8px; }
details.lmsr-ref .ref-content h4 { color: #e6edf3; margin: 12px 0 6px; font-size: 14px; }
details.lmsr-ref .ref-content h4:first-child { margin-top: 0; }
details.lmsr-ref .ref-content code { color: #58a6ff; background: #0d1117; padding: 1px 5px; border-radius: 3px; }
details.lmsr-ref .ref-content .formula { background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 8px 12px; margin: 6px 0; font-family: 'SF Mono', monospace; font-size: 12px; color: #e6edf3; overflow-x: auto; }
details.lmsr-ref .ref-content p { margin: 4px 0; }

.loading { text-align: center; padding: 40px; color: #8b949e; }
.error-msg { text-align: center; padding: 40px; color: #f85149; }

/* --- Auth panel --- */
.auth-panel { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 24px; max-width: 400px; margin: 40px auto; }
.auth-panel h2 { font-size: 18px; margin-bottom: 16px; }
.auth-panel p { font-size: 13px; color: #8b949e; margin-bottom: 16px; }
.auth-panel .btn-primary,
.auth-panel .btn-secondary { display: inline-flex; align-items: center; justify-content: center; text-decoration: none; }
.auth-panel .btn-primary { padding: 8px 20px; border-radius: 6px; border: 1px solid #238636; background: #238636; color: #fff; cursor: pointer; font-size: 14px; font-weight: 500; }
.auth-panel .btn-primary:hover { background: #2ea043; text-decoration: none; }
.auth-panel .btn-secondary { padding: 8px 14px; border-radius: 6px; border: 1px solid #30363d; background: transparent; color: #e6edf3; cursor: pointer; font-size: 13px; }
.auth-panel .btn-secondary:hover { border-color: #58a6ff; color: #58a6ff; text-decoration: none; }
.auth-panel .auth-actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }

/* --- Trading panel --- */
.trade-panel { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 24px; }
.trade-panel .section-title { margin-bottom: 16px; }
.trade-panel .trade-tabs { display: flex; gap: 0; margin-bottom: 16px; }
.trade-panel .trade-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-weight: 600; font-size: 14px; border: 1px solid #30363d; transition: all 0.15s; }
.trade-panel .trade-tab:first-child { border-radius: 6px 0 0 6px; }
.trade-panel .trade-tab:last-child { border-radius: 0 6px 6px 0; }
.trade-panel .trade-tab.buy-yes { color: #8b949e; }
.trade-panel .trade-tab.buy-yes.active { background: #238636; border-color: #238636; color: #fff; }
.trade-panel .trade-tab.buy-no { color: #8b949e; }
.trade-panel .trade-tab.buy-no.active { background: #da3633; border-color: #da3633; color: #fff; }
.trade-panel .trade-tab.sell-yes { color: #8b949e; }
.trade-panel .trade-tab.sell-yes.active { background: #1a3a5c; border-color: #58a6ff; color: #58a6ff; }
.trade-panel .trade-tab.sell-no { color: #8b949e; }
.trade-panel .trade-tab.sell-no.active { background: #1a3a5c; border-color: #58a6ff; color: #58a6ff; }
.trade-panel .trade-form { display: flex; flex-direction: column; gap: 12px; }
.trade-panel .input-group { display: flex; flex-direction: column; gap: 4px; }
.trade-panel .input-group label { font-size: 13px; color: #8b949e; }
.trade-panel .input-row { display: flex; align-items: center; gap: 8px; }
.trade-panel input[type="number"] { flex: 1; padding: 10px 12px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: #e6edf3; font-size: 15px; font-family: 'SF Mono', monospace; outline: none; }
.trade-panel input[type="number"]:focus { border-color: #58a6ff; }
.trade-panel .input-suffix { color: #8b949e; font-size: 13px; min-width: 50px; }
.trade-panel .estimate { font-size: 13px; color: #8b949e; padding: 8px 12px; background: #0d1117; border-radius: 6px; }
.trade-panel .estimate .est-value { color: #e6edf3; font-family: 'SF Mono', monospace; }
.trade-panel .btn-trade { width: 100%; padding: 12px; border-radius: 6px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
.trade-panel .btn-trade:disabled { opacity: 0.5; cursor: not-allowed; }
.trade-panel .btn-trade.buy-yes-btn { background: #238636; color: #fff; }
.trade-panel .btn-trade.buy-yes-btn:hover:not(:disabled) { background: #2ea043; }
.trade-panel .btn-trade.buy-no-btn { background: #da3633; color: #fff; }
.trade-panel .btn-trade.buy-no-btn:hover:not(:disabled) { background: #e04542; }
.trade-panel .btn-trade.sell-btn { background: #1a3a5c; color: #58a6ff; border: 1px solid #58a6ff; }
.trade-panel .btn-trade.sell-btn:hover:not(:disabled) { background: #1f4470; }
.trade-panel .trade-feedback { margin-top: 8px; padding: 10px 12px; border-radius: 6px; font-size: 13px; }
.trade-panel .trade-feedback.success { background: #1f6f2b33; border: 1px solid #238636; color: #3fb950; }
.trade-panel .trade-feedback.error { background: #3d1f1f33; border: 1px solid #da3633; color: #f85149; }
.trade-panel .login-prompt { color: #8b949e; font-size: 14px; text-align: center; padding: 12px; }
.trade-panel .login-prompt a { cursor: pointer; }

/* Your position in market detail */
.your-position { background: #161b22; border: 1px solid #58a6ff; border-radius: 8px; padding: 14px 16px; margin-bottom: 20px; font-size: 14px; }
.your-position .pos-title { color: #58a6ff; font-weight: 600; margin-bottom: 6px; }
.your-position .pos-row { display: flex; gap: 24px; }
.your-position .pos-item { display: flex; gap: 6px; }

/* --- Portfolio view --- */
.portfolio-section { margin-bottom: 24px; }
.portfolio-summary { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 16px; display: flex; gap: 24px; flex-wrap: wrap; }
.portfolio-summary .stat { display: flex; flex-direction: column; }
.portfolio-summary .stat-label { font-size: 12px; color: #8b949e; }
.portfolio-summary .stat-value { font-size: 24px; font-weight: 700; font-family: 'SF Mono', monospace; color: #e6edf3; }
.portfolio-summary .stat-value.green { color: #3fb950; }

.position-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; }
.position-card .pos-market { font-size: 14px; font-weight: 500; margin-bottom: 8px; }
.position-card .pos-market a { color: #58a6ff; }
.position-card .pos-details { display: flex; gap: 20px; font-size: 13px; }
.position-card .pos-details .pos-outcome { font-weight: 500; }
.activity-help { color: #8b949e; font-size: 13px; margin: -4px 0 12px; }
.activity-table td { vertical-align: top; }
.activity-summary { font-weight: 500; }
.activity-market { color: #8b949e; font-size: 12px; margin-top: 2px; }
.activity-change { display: flex; flex-direction: column; gap: 2px; }
.delta { font-family: 'SF Mono', monospace; font-size: 12px; }
.delta.pos { color: #3fb950; }
.delta.neg { color: #f85149; }
.delta.flat { color: #8b949e; }
.balance-after { font-family: 'SF Mono', monospace; font-size: 13px; }
.activity-more-btn { margin-top: 12px; padding: 8px 14px; border-radius: 6px; border: 1px solid #30363d; background: transparent; color: #e6edf3; cursor: pointer; font-size: 13px; }
.activity-more-btn:hover:not(:disabled) { border-color: #58a6ff; color: #58a6ff; }
.activity-more-btn:disabled { opacity: 0.6; cursor: wait; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Futarchy</h1>
    <span class="subtitle">Prediction Markets</span>
    <a href="/" class="home-link">Home</a>
    <span class="spacer"></span>
    <div id="auth-bar" class="auth-bar"></div>
  </header>
  <div id="app"><div class="loading">Loading...</div></div>
</div>

<script>
(function() {
  const app = document.getElementById('app');
  const authBar = document.getElementById('auth-bar');
  const githubLoginBaseUrl = '/v1/auth/github/login';
  const accountPickerKey = 'futarchy_force_account_picker';
  const ACTIVITY_PAGE_SIZE = 20;
  let pollTimer = null;
  let currentFilter = 'open';
  let currentRepoFilter = sessionStorage.getItem('futarchy_repo_filter') || 'all';
  let activityEntries = [];
  let activityHasMore = false;
  let activityNextBeforeTxId = null;

  // --- Auth state ---
  function getAuth() {
    const key = localStorage.getItem('futarchy_api_key');
    const githubLogin = localStorage.getItem('futarchy_github_login');
    const accountId = localStorage.getItem('futarchy_account_id');
    if (key && githubLogin) return { key, githubLogin, accountId };
    return null;
  }

  function setAuth(apiKey, githubLogin, accountId) {
    localStorage.setItem('futarchy_api_key', apiKey);
    localStorage.setItem('futarchy_github_login', githubLogin);
    localStorage.removeItem('futarchy_username');
    localStorage.setItem('futarchy_account_id', String(accountId));
    sessionStorage.removeItem(accountPickerKey);
  }

  function clearAuth() {
    localStorage.removeItem('futarchy_api_key');
    localStorage.removeItem('futarchy_github_login');
    localStorage.removeItem('futarchy_username');
    localStorage.removeItem('futarchy_account_id');
    sessionStorage.setItem(accountPickerKey, '1');
  }

  function githubLoginUrl() {
    if (sessionStorage.getItem(accountPickerKey) === '1') {
      return githubLoginBaseUrl + '?prompt=select_account';
    }
    return githubLoginBaseUrl;
  }

  function consumeAuthFragment() {
    if (!window.location.hash.startsWith('#auth=')) {
      return false;
    }
    const params = new URLSearchParams(window.location.hash.slice(1));
    const apiKey = params.get('auth');
    const accountId = params.get('account_id');
    const login = params.get('login');
    if (apiKey && login) {
      setAuth(apiKey, login, accountId || '');
    }
    history.replaceState(null, '', window.location.pathname + window.location.search + '#/');
    return true;
  }

  // --- Render auth bar ---
  async function renderAuthBar() {
    const auth = getAuth();
    if (!auth) {
      authBar.innerHTML = '<button id="login-btn">Sign in with GitHub</button>';
      document.getElementById('login-btn').onclick = () => {
        window.location.href = githubLoginUrl();
      };
      return;
    }
    let balanceMarkup = '<span class="balance-wrap"><span class="balance">...</span></span>';
    try {
      const me = await apiAuth('/me');
      balanceMarkup = `
        <span class="balance-wrap">
          <span class="balance">${fmtVal(me.total)} total</span>
          <span class="balance-detail">${fmtVal(me.available)} avail · ${fmtVal(me.frozen)} frozen</span>
        </span>
      `;
    } catch (e) {
      if (e.status === 401) {
        clearAuth();
        renderAuthBar();
        return;
      }
    }
    authBar.innerHTML = `
      <span class="auth-label">Signed in as</span>
      <span class="username">${esc(auth.githubLogin)}</span>
      ${balanceMarkup}
      <button id="portfolio-btn">Portfolio</button>
      <button id="logout-btn" class="logout">Logout</button>
    `;
    document.getElementById('portfolio-btn').onclick = () => { location.hash = '#/portfolio'; };
    document.getElementById('logout-btn').onclick = () => {
      clearAuth();
      renderAuthBar();
      route();
    };
  }

  // --- API helpers ---
  async function requestJson(path, opts) {
    const resp = await fetch('/v1' + path, opts);
    let data = null;
    try {
      data = await resp.json();
    } catch (_) {}
    return { resp, data };
  }

  function getErrorMessage(data, fallback) {
    if (data && data.error && data.error.message) return data.error.message;
    if (data && data.detail) return data.detail;
    if (data && data.message) return data.message;
    return fallback;
  }

  async function api(path) {
    const result = await requestJson(path);
    if (!result.resp.ok) {
      const error = new Error(getErrorMessage(result.data, 'API ' + result.resp.status));
      error.status = result.resp.status;
      throw error;
    }
    return result.data;
  }

  async function apiAuth(path, opts) {
    const auth = getAuth();
    if (!auth) {
      const error = new Error('Not authenticated');
      error.status = 401;
      throw error;
    }
    const headers = Object.assign(
      { 'Authorization': 'Bearer ' + auth.key, 'Content-Type': 'application/json' },
      (opts && opts.headers) || {},
    );
    const result = await requestJson(path, Object.assign({}, opts || {}, { headers }));
    if (!result.resp.ok) {
      const error = new Error(getErrorMessage(result.data, 'API ' + result.resp.status));
      error.status = result.resp.status;
      throw error;
    }
    return result.data;
  }

  function pct(v) { return (parseFloat(v) * 100).toFixed(1); }
  function fmtPrice(v) { return (parseFloat(v) * 100).toFixed(1) + '\u00a2'; }
  function fmtVal(v) { return parseFloat(v).toFixed(2); }
  function fmtCredits(v) { return parseFloat(v).toFixed(0); }
  function fmtSigned(v) {
    const n = parseFloat(v);
    const prefix = n > 0 ? '+' : '';
    return prefix + n.toFixed(2);
  }
  function fmtDate(iso) {
    if (!iso) return '\u2014';
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }
  function fmtTime(iso) {
    if (!iso) return '\u2014';
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }
  function isConditional(m) {
    return m.metadata && m.metadata.market_type === 'conditional';
  }
  function badgeClass(status) {
    return 'badge badge-' + status;
  }
  function marketRepo(m) {
    if (m.metadata && m.metadata.repo) return m.metadata.repo;
    if (!m.category_id) return '';
    return m.category_id.split('#')[0] || '';
  }
  function shortRepo(repo) {
    if (!repo) return 'unknown';
    const parts = repo.split('/');
    return parts[parts.length - 1] || repo;
  }
  function deltaClass(v) {
    const n = parseFloat(v);
    if (n > 0) return 'pos';
    if (n < 0) return 'neg';
    return 'flat';
  }
  function renderActivityTable(activity) {
    return `<table class="activity-table">
      <tr><th>Time</th><th>Event</th><th>Change</th><th>Balance After</th></tr>
      ${activity.map(entry => {
        const marketText = entry.market_id
          ? `<a href="#/market/${entry.market_id}">${esc(entry.market_question || ('Market #' + entry.market_id))}</a>`
          : '';
        const metaBits = [];
        if (entry.market_status) metaBits.push(entry.market_status);
        if (entry.market_resolution) metaBits.push('resolves ' + entry.market_resolution.toUpperCase());
        return `<tr>
          <td class="mono">${esc(fmtTime(entry.created_at))}</td>
          <td>

  // --- LMSR helpers (lightweight, for labels + estimates) ---

  function lmsrPriceImpact(b, refAmount) {
    var bf = parseFloat(b);
    var d = bf * Math.log(2 * Math.exp(refAmount / bf) - 1);
    var priceAfter = Math.exp(d / bf) / (Math.exp(d / bf) + 1);
    return (priceAfter - 0.5) / 0.5;
  }

  function liquidityLabel(b) {
    var impact = lmsrPriceImpact(b, 10);
    if (impact < 0.005) return { label: 'Deep', color: '#3fb950' };
    if (impact < 0.02)  return { label: 'Moderate', color: '#f0883e' };
    if (impact < 0.10)  return { label: 'Thin', color: '#f85149' };
    return { label: 'Very Thin', color: '#da3633' };
  }

  // Estimate shares for a buy using LMSR cost function
  // C(q) = b * ln(sum(e^(qi/b)))
  // Buying `budget` credits of `outcome` in market with q, b
  function estimateBuyShares(q, b, outcome, budget) {
    var bf = parseFloat(b);
    var budgetF = parseFloat(budget);
    if (budgetF <= 0 || bf <= 0) return { shares: 0, avgPrice: 0, newPrice: 0 };

    // Current cost
    var outcomes = Object.keys(q);
    function costFn(qq) {
      var sum = 0;
      for (var i = 0; i < outcomes.length; i++) sum += Math.exp(parseFloat(qq[outcomes[i]]) / bf);
      return bf * Math.log(sum);
    }
    function priceFn(qq, o) {
      var sum = 0;
      for (var i = 0; i < outcomes.length; i++) sum += Math.exp(parseFloat(qq[outcomes[i]]) / bf);
      return Math.exp(parseFloat(qq[o]) / bf) / sum;
    }

    // Binary search for shares that cost exactly budget
    var lo = 0, hi = budgetF * 10; // upper bound generous
    for (var iter = 0; iter < 100; iter++) {
      var mid = (lo + hi) / 2;
      var newQ = {};
      for (var i = 0; i < outcomes.length; i++) {
        newQ[outcomes[i]] = parseFloat(q[outcomes[i]]) + (outcomes[i] === outcome ? mid : 0);
      }
      var tradeCost = costFn(newQ) - costFn(q);
      if (tradeCost < budgetF) lo = mid;
      else hi = mid;
    }
    var shares = (lo + hi) / 2;
    var newQFinal = {};
    for (var i = 0; i < outcomes.length; i++) {
      newQFinal[outcomes[i]] = parseFloat(q[outcomes[i]]) + (outcomes[i] === outcome ? shares : 0);
    }
    var avgPrice = shares > 0 ? budgetF / shares : 0;
    var newPrice = priceFn(newQFinal, outcome);
    return { shares: shares, avgPrice: avgPrice, newPrice: newPrice };
  }

  // Estimate credit proceeds from selling `amount` shares of `outcome`
  function estimateSellProceeds(q, b, outcome, amount) {
    var bf = parseFloat(b);
    var amountF = parseFloat(amount);
    if (amountF <= 0 || bf <= 0) return { proceeds: 0, avgPrice: 0, newPrice: 0 };

    var outcomes = Object.keys(q);
    function costFn(qq) {
      var sum = 0;
      for (var i = 0; i < outcomes.length; i++) sum += Math.exp(parseFloat(qq[outcomes[i]]) / bf);
      return bf * Math.log(sum);
    }
    function priceFn(qq, o) {
      var sum = 0;
      for (var i = 0; i < outcomes.length; i++) sum += Math.exp(parseFloat(qq[outcomes[i]]) / bf);
      return Math.exp(parseFloat(qq[o]) / bf) / sum;
    }

    var newQ = {};
    for (var i = 0; i < outcomes.length; i++) {
      newQ[outcomes[i]] = parseFloat(q[outcomes[i]]) - (outcomes[i] === outcome ? amountF : 0);
    }
    var proceeds = costFn(q) - costFn(newQ);
    var avgPrice = amountF > 0 ? proceeds / amountF : 0;
    var newPrice = priceFn(newQ, outcome);
    return { proceeds: Math.max(0, proceeds), avgPrice: avgPrice, newPrice: newPrice };
  }

  // --- Router ---

  function route() {
    if (pollTimer) {
      clearInterval(pollTimer);
      pollTimer = null;

  async function fetchAndRenderPortfolio() {
    const auth = getAuth();
    if (!auth) return;
    const area = document.getElementById('portfolio-area');
    if (!area) return;

    try {
      const [me, activityPage, allMarkets] = await Promise.all([
        apiAuth('/me'),
        apiAuth('/me/activity?limit=' + ACTIVITY_PAGE_SIZE),
        api('/markets'),
      ]);
      activityEntries = activityPage.entries || [];
      activityHasMore = !!activityPage.has_more;
      activityNextBeforeTxId = activityPage.next_before_tx_id || null;

      // Find positions for this account across all markets
      const accountId = parseInt(auth.accountId);
      const positionPromises = allMarkets.map(m =>
        api('/markets/' + m.market_id + '/positions').then(positions => {
          const myPos = positions.find(p => p.account_id === accountId);
          if (myPos) {
            const hasNonZero = Object.values(myPos.positions).some(v => parseFloat(v) !== 0);
            if (hasNonZero) return { market: m, positions: myPos.positions };
          }
          return null;
        }).catch(() => null)
      );
      const allPositions = (await Promise.all(positionPromises)).filter(Boolean);

      // Compute total position value (shares * current price)
      let totalPositionValue = 0;
      allPositions.forEach(p => {
        Object.entries(p.positions).forEach(([outcome, shares]) => {
          const s = parseFloat(shares);
          const price = p.market.prices[outcome] ? parseFloat(p.market.prices[outcome]) : 0;
          totalPositionValue += s * price;
        });
      });

      area.innerHTML = `
        <div class="portfolio-summary">
          <div class="stat">
            <span class="stat-label">Available Balance</span>
            <span class="stat-value green">${fmtVal(me.available)}</span>
          </div>
          <div class="stat">
            <span class="stat-label">Frozen</span>
            <span class="stat-value">${fmtVal(me.frozen)}</span>
          </div>
          <div class="stat">
            <span class="stat-label">Total Credits</span>
            <span class="stat-value">${fmtVal(me.total)}</span>
          </div>
          <div class="stat">
            <span class="stat-label">Position Value (est.)</span>
            <span class="stat-value">${fmtVal(totalPositionValue)}</span>
          </div>
        </div>

        <div class="section-title">Positions (${allPositions.length})</div>
        ${allPositions.length === 0 ? '<div class="empty">No positions yet. Start trading!</div>' :
          allPositions.map(p => {
            const isOpen = p.market.status === 'open';
            return `<div class="position-card">
              <div class="pos-market">
                <a href="#/market/${p.market.market_id}">${esc(p.market.question)}</a>
                <span class="${badgeClass(p.market.status)}" style="margin-left:8px">${p.market.status}</span>
              </div>
              <div class="pos-details">
                ${Object.entries(p.positions).map(([outcome, shares]) => {
                  const s = parseFloat(shares);
                  if (s === 0) return '';
                  const color = outcome === 'yes' ? '#3fb950' : '#f85149';
                  const price = p.market.prices[outcome] ? parseFloat(p.market.prices[outcome]) : 0;
                  const value = s * price;
                  return `<span class="pos-outcome" style="color:${color}">${outcome.toUpperCase()}: <span class="mono">${fmtVal(shares)} shares</span></span>
                    ${isOpen ? `<span style="color:#8b949e">@ ${fmtPrice(p.market.prices[outcome])} = <span class="mono">${fmtVal(value)}</span> credits</span>` : ''}`;
                }).join('')}
              </div>
            </div>`;
          }).join('')
        }

        <div id="activity-panel">${renderActivitySection()}</div>

        ${me.locks && me.locks.length > 0 ? `
          <div class="section-title" style="margin-top:24px">Active Locks (${me.locks.length})</div>
          <table>
            <tr><th>Lock ID</th><th>Market</th><th>Amount</th><th>Type</th></tr>
            ${me.locks.map(lk => `<tr>
              <td class="mono">${lk.lock_id}</td>
              <td><a href="#/market/${lk.market_id}">#${lk.market_id}</a></td>
              <td class="mono">${fmtVal(lk.amount)}</td>
              <td>${lk.lock_type}</td>
            </tr>`).join('')}
          </table>
        ` : ''}
      `;
      bindActivityControls();
    } catch (e) {
      if (e.status === 401) {
        clearAuth();
        renderAuthBar();
        location.hash = '#/auth';
        return;
      }
      area.innerHTML = '<div class="error-msg">Failed to load portfolio. ' + esc(e.message) + '</div>';
    }
  }

  function bindTabs() {

      t.onclick = () => {
        currentFilter = t.dataset.filter;
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        t.classList.add('active');
        fetchAndRenderMarkets();
      };
    });
    const repoSelect = document.getElementById('repo-filter');
    if (repoSelect) {
      repoSelect.value = currentRepoFilter;

        fetchAndRenderMarkets();
      };

  function updateRepoFilterOptions(markets) {
    const repoSelect = document.getElementById('repo-filter');
    if (!repoSelect) return;

    const repos = Array.from(new Set(markets.map(marketRepo).filter(Boolean))).sort();
    repoSelect.innerHTML = '<option value="all">All repos</option>' +
      repos.map(repo => `<option value="${esc(repo)}">${esc(repo)}</option>`).join('');

    const values = ['all'].concat(repos);
    if (!values.includes(currentRepoFilter)) {
      currentRepoFilter = 'all';
      sessionStorage.setItem('futarchy_repo_filter', currentRepoFilter);
    }
    repoSelect.value = currentRepoFilter;
  }

  async function fetchAndRenderMarkets() {
    try {
      const statusParam = currentFilter === 'settled' ? 'resolved,void' : currentFilter;
      const params = currentFilter !== 'all' ? '?status=' + statusParam : '';
      const markets = await api('/markets' + params);
      updateRepoFilterOptions(markets);
      const area = document.getElementById('markets-area');
      if (!area) return;
      const filteredMarkets = currentRepoFilter === 'all'
        ? markets
        : markets.filter(m => marketRepo(m) === currentRepoFilter);
      if (filteredMarkets.length === 0) {
        area.innerHTML = '<div class="empty">No markets found.</div>';
        return;
      }
      area.innerHTML = filteredMarkets.map(m => {
        const yesP = m.prices.yes ? parseFloat(m.prices.yes) : 0;
        const noP = m.prices.no ? parseFloat(m.prices.no) : 0;
        const isVoid = m.status === 'void';
        const yesPct = m.status === 'open' ? Math.max(yesP * 100, 5) : (m.resolution === 'yes' ? 100 : 0);
        const noPct = m.status === 'open' ? Math.max(noP * 100, 5) : (m.resolution === 'no' ? 100 : 0);
        const conditional = isConditional(m);
        const liq = liquidityLabel(m.b);
        const repo = marketRepo(m);

        let priceBar;
        if (isVoid) {
          priceBar = `<div class="price-bar"><div class="price-void">VOID \u2014 positions refunded</div></div>`;
        } else if (m.status === 'open') {
          priceBar = `<div class="price-bar">
            <div class="price-yes" style="width:${yesPct}%">${pct(m.prices.yes)}%</div>
            <div class="price-no" style="width:${noPct}%">${pct(m.prices.no)}%</div>
          </div>
          <div class="price-labels"><span>Yes ${fmtPrice(m.prices.yes)}</span><span>No ${fmtPrice(m.prices.no)}</span></div>`;
        } else {
          priceBar = `<div class="price-bar">
            <div class="price-yes" style="width:${yesPct}%">${m.resolution === 'yes' ? 'YES' : ''}</div>
            <div class="price-no" style="width:${noPct}%">${m.resolution === 'no' ? 'NO' : ''}</div>
          </div>`;
        }

        return `<div class="market-card" onclick="location.hash='#/market/${m.market_id}'">
          <div class="card-header">
            <span class="card-question">${esc(m.question)}</span>
            <div class="card-badges">
              ${repo ? `<span class="repo-pill" title="${esc(repo)}">${esc(shortRepo(repo))}</span>` : ''}
              ${conditional ? '<span class="badge badge-conditional">Conditional</span>' : ''}
              <span class="${badgeClass(m.status)}">${m.status}</span>
            </div>
          </div>
          <div class="price-bar-container">${priceBar}</div>
          <div class="card-footer">
            <span>${m.num_trades} trade${m.num_trades !== 1 ? 's' : ''}</span>
            <span>Liquidity: ${fmtCredits(m.liquidity)} credits</span>
            ${m.status === 'open' && m.deadline ? `<span>Closes ${fmtDate(m.deadline)}</span>` : ''}
            ${m.resolved_at ? `<span>${m.status === 'void' ? 'Voided' : 'Settled'} ${fmtTime(m.resolved_at)}</span>` : `<span>${fmtTime(m.created_at)}</span>`}
          </div>
        </div>`;
      }).join('');
    } catch (e) {
      const area = document.getElementById('markets-area');
      if (area) area.innerHTML = '<div class="error-msg">Failed to load markets. Retrying...</div>';
    }
  }

  async function fetchAndRenderDetail(id) {

      const [m, trades, positions, depthData] = await Promise.all([
        api('/markets/' + id),
        api('/markets/' + id + '/trades'),
        api('/markets/' + id + '/positions'),
        api('/markets/' + id + '/depth').catch(() => ({ rows: [] })),
      ]);

      const prUrl = m.metadata && m.metadata.pr_url;

      const auth = getAuth();

      if (m.status === 'resolved') {
        resolution = `<div class="resolution-banner ${m.resolution}">Resolved: <strong>${m.resolution.toUpperCase()}</strong>${m.resolved_at ? ' on ' + fmtTime(m.resolved_at) : ''}</div>`;
      } else if (m.status === 'void') {
        resolution = `<div class="resolution-banner void">Market voided \u2014 all positions refunded${m.resolved_at ? ' on ' + fmtTime(m.resolved_at) : ''}</div>`;

            yourPosition = `<div class="your-position">
              <div class="pos-title">Your Position</div>
              <div class="pos-row">
                ${Object.entries(myPos.positions).map(([outcome, shares]) => {
                  const s = parseFloat(shares);

                  return `<div class="pos-item">
                    <span style="color:${color};font-weight:600">${outcome.toUpperCase()}</span>
                    <span class="mono">${fmtVal(shares)} shares</span>
                    ${m.status === 'open' ? `<span style="color:#8b949e">(\u2248${fmtVal(value)} credits)</span>` : ''}
                  </div>`;
                }).join('')}
              </div>
            </div>`;
          }
        }
      }

      // Trading panel for open markets
      let tradePanel = '';

            <div class="section-title">Trade</div>
            <div class="login-prompt"><a href="${githubLoginUrl()}">Sign in with GitHub</a> to start trading on this market.</div>
          </div>`;
        } else {

          const myPos = positions.find(p => p.account_id === accountId);
          const yesShares = myPos ? parseFloat(myPos.positions.yes || '0') : 0;
          const noShares = myPos ? parseFloat(myPos.positions.no || '0') : 0;

          tradePanel = `<div class="trade-panel">
            <div class="section-title">Trade</div>
            <div class="trade-tabs">
              <div class="trade-tab buy-yes active" data-action="buy-yes">Buy YES</div>

                <td class="mono">${fmtVal(r.shares)}</td>

            </table>`;
        }).join('');
        depthSection = `<div class="section">
          <div class="section-title">Market Depth</div>
          <p style="font-size:13px;color:#8b949e;margin-bottom:8px">Cost in credits to move an outcome's price to a target probability.</p>

        </div>`;
      }

      // LMSR reference
      const lmsrRef = `<details class="lmsr-ref">
        <summary>LMSR Reference \u2014 how this market works</summary>
        <div class="ref-content">
          <h4>Cost Function</h4>
          <div class="formula">C(q) = b \u00b7 ln( \u03a3 e^(q\u1d62 / b) )</div>
          <p>The total amount collected by the market maker. Trading costs are <code>C(after) \u2212 C(before)</code>.</p>

          <h4>Prices (Probabilities)</h4>
          <div class="formula">p\u1d62 = e^(q\u1d62 / b) / \u03a3 e^(q\u2c7c / b)</div>
          <p>Softmax over quantities. Always sum to 1.</p>

          <h4>Liquidity Parameter (b)</h4>
          <div class="formula">b = ${fmtVal(m.b)}</div>
          <p>Controls market depth. Higher <code>b</code> = more capital needed to move prices. A 10-credit trade at 50/50 moves the price by ${(lmsrPriceImpact(m.b, 10) * 100).toFixed(2)}%.</p>

          <h4>Max Market Maker Loss</h4>
          <div class="formula">max loss = b \u00b7 ln(n) = ${fmtVal(m.b)} \u00b7 ln(${m.outcomes.length}) = ${fmtCredits(m.liquidity)} credits</div>
          <p>The funding required to create this market. This is a fixed bound \u2014 the AMM can never lose more than this, regardless of how the market trades. The bound holds because LMSR is a reversible market maker: any trade can be undone, so the worst case never changes.</p>

          <h4>Credits</h4>
          <p>All amounts are denominated in <strong style="color:#e6edf3">credits</strong> \u2014 play money used for forecasting. No real money is at risk. Each user starts with an initial balance of credits to trade with.</p>

          <h4>This Market</h4>
          <table>
            <tr><td style="color:#8b949e;width:140px">Liquidity (b)</td><td class="mono">${fmtVal(m.b)}</td></tr>
            <tr><td style="color:#8b949e">Funding / Max Loss</td><td class="mono">${fmtCredits(m.liquidity)} credits</td></tr>
            <tr><td style="color:#8b949e">Outcomes</td><td class="mono">${m.outcomes.length} (${m.outcomes.join(', ')})</td></tr>
            <tr><td style="color:#8b949e">AMM Account</td><td class="mono">#${m.amm_account_id}</td></tr>
            ${Object.keys(m.q).map(o => `<tr><td style="color:#8b949e">q[${o}]</td><td class="mono">${fmtVal(m.q[o])}</td></tr>`).join('')}
          </table>
        </div>
      </details>`;

      const liq = liquidityLabel(m.b);

      app.innerHTML = `
        <a class="back-link" href="#/">\u2190 All Markets</a>
        <div class="detail-header">
          <div class="detail-question">${esc(m.question)}</div>
          <div class="detail-meta">
            ${repo ? `<span class="repo-pill" title="${esc(repo)}">${esc(repo)}</span>` : ''}
            ${conditional ? '<span class="badge badge-conditional">Conditional</span>' : ''}
            <span class="${badgeClass(m.status)}">${m.status}</span>
            ${m.status === 'open' && m.deadline ? `<span>Closes ${fmtDate(m.deadline)}</span>` : ''}
            <span>Liquidity: ${fmtCredits(m.liquidity)} credits <span style="color:${liq.color}">(${liq.label})</span></span>
            <span>Volume: <span class="mono">${fmtVal(m.volume)}</span></span>
            <span>${m.num_trades} trade${m.num_trades !== 1 ? 's' : ''}</span>
            ${prUrl ? `<a href="${esc(prUrl)}" target="_blank" rel="noopener">View PR</a>` : ''}
          </div>
        </div>

        ${resolution}
        ${rulesBox}
        ${yourPosition}

        ${m.status === 'open' ? `<div class="price-display">
          <div class="price-box yes">
            <div class="price-label">Yes</div>
            <div class="price-value yes">${pct(m.prices.yes)}%</div>
            <div class="price-label">${fmtPrice(m.prices.yes)}</div>
          </div>
          <div class="price-box no">
            <div class="price-label">No</div>
            <div class="price-value no">${pct(m.prices.no)}%</div>
            <div class="price-label">${fmtPrice(m.prices.no)}</div>
          </div>
        </div>` : ''}

        ${tradePanel}

        ${depthSection}

        <div class="section">
          <div class="section-title">Trades (${trades.length})</div>
          ${trades.length === 0 ? '<div class="empty">No trades yet.</div>' : `<table>
            <tr><th>ID</th><th>Outcome</th><th>Amount</th><th>Price</th><th>Value</th><th>Time</th></tr>
            ${trades.slice().reverse().map(t => `<tr>
              <td class="mono">${t.trade_id}</td>
              <td><span style="color:${t.outcome === 'yes' ? '#3fb950' : '#f85149'}">${t.outcome}</span></td>
              <td class="mono">${fmtVal(t.amount)}</td>
              <td class="mono">${fmtPrice(t.price)}</td>
              <td class="mono">${fmtVal(t.value)}</td>
              <td>${fmtTime(t.created_at)}</td>
            </tr>`).join('')}
          </table>`}
        </div>

        <div class="section">
          <div class="section-title">Positions (${positions.length})</div>
          ${positions.length === 0 ? '<div class="empty">No positions.</div>' : `<table>
            <tr><th>Account</th><th>Yes</th><th>No</th></tr>
            ${positions.map(p => `<tr>
              <td class="mono">${p.account_id}${auth && p.account_id === parseInt(auth.accountId) ? ' (you)' : ''}</td>
              <td class="mono" style="color:#3fb950">${fmtVal(p.positions.yes || '0')}</td>
              <td class="mono" style="color:#f85149">${fmtVal(p.positions.no || '0')}</td>
            </tr>`).join('')}
          </table>`}
        </div>

        ${lmsrRef}
      `;

      // Bind trading panel if present
      if (m.status === 'open' && auth) {
        bindTradePanel(m, positions);
      }

    } catch (e) {
      app.innerHTML = `<a class="back-link" href="#/">\u2190 All Markets</a><div class="error-msg">Market not found or failed to load.</div>`;
    }
  }

  // --- Trade Panel Logic ---

  function bindTradePanel(market, positions) {
    const tabs = document.querySelectorAll('.trade-tab');
    const amountInput = document.getElementById('trade-amount');
    const inputLabel = document.getElementById('trade-input-label');
    const inputSuffix = document.getElementById('trade-suffix');
    const estimateDiv = document.getElementById('trade-estimate');
    const tradeBtn = document.getElementById('trade-btn');
    const feedback = document.getElementById('trade-feedback');

    if (!amountInput || !tradeBtn) return;

    let currentAction = 'buy-yes'; // buy-yes, buy-no, sell-yes, sell-no

    const auth = getAuth();
    const accountId = parseInt(auth.accountId);
    const myPos = positions.find(p => p.account_id === accountId);
    const yesShares = myPos ? parseFloat(myPos.positions.yes || '0') : 0;
    const noShares = myPos ? parseFloat(myPos.positions.no || '0') : 0;

    function updateUI() {
      const isBuy = currentAction.startsWith('buy');
      const outcome = currentAction.endsWith('yes') ? 'yes' : 'no';

      // Update tabs
      tabs.forEach(t => t.classList.toggle('active', t.dataset.action === currentAction));

      // Update labels
      if (isBuy) {
        inputLabel.textContent = 'Budget (credits to spend)';
        inputSuffix.textContent = 'credits';
      } else {
        inputLabel.textContent = 'Shares to sell';
        inputSuffix.textContent = 'shares';
      }

      // Update button
      if (isBuy) {
        tradeBtn.textContent = 'Buy ' + outcome.toUpperCase();
        tradeBtn.className = 'btn-trade ' + (outcome === 'yes' ? 'buy-yes-btn' : 'buy-no-btn');
      } else {
        tradeBtn.textContent = 'Sell ' + outcome.toUpperCase();
        tradeBtn.className = 'btn-trade sell-btn';
      }

      updateEstimate();
    }

    function updateEstimate() {
      const val = parseFloat(amountInput.value);
      const isBuy = currentAction.startsWith('buy');
      const outcome = currentAction.endsWith('yes') ? 'yes' : 'no';

      if (!val || val <= 0) {
        estimateDiv.innerHTML = 'Enter an amount to see estimate';
        tradeBtn.disabled = true;
        return;
      }

      if (isBuy) {
        const est = estimateBuyShares(market.q, market.b, outcome, val);
        estimateDiv.innerHTML = `
          Est. shares: <span class="est-value">${est.shares.toFixed(2)}</span> |
          Avg price: <span class="est-value">${(est.avgPrice * 100).toFixed(1)}\u00a2</span> |
          New price: <span class="est-value">${(est.newPrice * 100).toFixed(1)}%</span>
        `;
        tradeBtn.disabled = false;
      } else {
        const maxShares = outcome === 'yes' ? yesShares : noShares;
        if (val > maxShares) {
          estimateDiv.innerHTML = `<span style="color:#f85149">You only have ${fmtVal(maxShares)} ${outcome.toUpperCase()} shares</span>`;
          tradeBtn.disabled = true;
          return;
        }
        const est = estimateSellProceeds(market.q, market.b, outcome, val);
        estimateDiv.innerHTML = `
          Est. proceeds: <span class="est-value">${est.proceeds.toFixed(2)} credits</span> |
          Avg price: <span class="est-value">${(est.avgPrice * 100).toFixed(1)}\u00a2</span> |
          New price: <span class="est-value">${(est.newPrice * 100).toFixed(1)}%</span>
        `;
        tradeBtn.disabled = false;
      }
    }

    // Tab clicks
    tabs.forEach(t => {
      t.onclick = () => {
        currentAction = t.dataset.action;
        amountInput.value = '';
        feedback.innerHTML = '';
        updateUI();
        amountInput.focus();
      };
    });

    // Amount input
    amountInput.oninput = updateEstimate;

    // Trade button
    tradeBtn.onclick = async () => {
      const val = amountInput.value;
      if (!val || parseFloat(val) <= 0) return;

      const isBuy = currentAction.startsWith('buy');
      const outcome = currentAction.endsWith('yes') ? 'yes' : 'no';

      tradeBtn.disabled = true;
      tradeBtn.textContent = 'Submitting...';
      feedback.innerHTML = '';

      try {
        let result;
        if (isBuy) {
          result = await apiAuth('/markets/' + market.market_id + '/buy', {
            method: 'POST',
            body: JSON.stringify({ outcome: outcome, budget: val }),
          });
        } else {
          result = await apiAuth('/markets/' + market.market_id + '/sell', {
            method: 'POST',
            body: JSON.stringify({ outcome: outcome, amount: val }),
          });
        }

        const verb = isBuy ? 'Bought' : 'Sold';
        feedback.innerHTML = `<div class="trade-feedback success">
          ${verb} <strong>${fmtVal(result.amount)}</strong> ${outcome.toUpperCase()} shares
          at <strong>${fmtPrice(result.price)}</strong>
          (value: ${fmtVal(result.value)} credits)
        </div>`;

        amountInput.value = '';

        // Refresh the page data and auth bar after trade
        renderAuthBar();
        clearInterval(pollTimer);
        setTimeout(() => {
          fetchAndRenderDetail(market.market_id);
          pollTimer = setInterval(() => fetchAndRenderDetail(market.market_id), 15000);
        }, 500);

      } catch (e) {
        feedback.innerHTML = `<div class="trade-feedback error">${esc(e.message)}</div>`;
        updateUI();
      }
    };

    updateUI();
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  window.addEventListener('hashchange', route);
  consumeAuthFragment();
  renderAuthBar();
  route();
})();
</script>
</body>
</html>
